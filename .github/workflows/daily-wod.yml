name: Notion WOD Watchdog

on:
  schedule:
    # UTC schedules equivalent to checks every 15 minutes from 06:07 to 12:52 KST.
    # Splitting the UTC range avoids relying on GitHub's timezone schedule extension.
    # The generator exits without creating a duplicate when today's WOD already exists.
    - cron: "7,22,37,52 21-23 * * *"
    - cron: "7,22,37,52 0-3 * * *"
  workflow_dispatch:

concurrency:
  group: daily-notion-wod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ensure-wod-exists:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ensure today's WOD exists in Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
        run: node scripts/create-daily-wod.mjs
